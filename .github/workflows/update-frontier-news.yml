name: Update Frontier Power USA news

# Pulls press releases from frontierpowerusa.com's WordPress REST API and
# writes data/frontier-news.json (dashboard) + frontier-news.xml (RSS feed).
# News is infrequent, so a few times a day is plenty. Commits only on change.

on:
  schedule:
    - cron: '20 13 * * *'   # ~09:20 ET
    - cron: '20 21 * * *'   # ~17:20 ET
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/update-frontier-news.yml'
      - '.github/scripts/fetch-frontier-news.js'

permissions:
  contents: write

concurrency:
  group: frontier-news-update
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch news → JSON + RSS
        run: node .github/scripts/fetch-frontier-news.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/frontier-news.json frontier-news.xml
          if git diff --cached --quiet; then
            echo "No change in Frontier news."
            exit 0
          fi
          LATEST=$(node -e "const j=require('./data/frontier-news.json');process.stdout.write((j.items[0]||{}).title||'update')")
          git commit -m "chore(frontier-news): refresh — ${LATEST} [skip ci]"
          git push
