name: Update EOSE news
on:
  schedule:
    - cron: '20 13 * * *'   # ~09:20 ET (pre-open)
    - cron: '20 21 * * *'   # ~17:20 ET (post-close)
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/update-eose-news.yml'
      - '.github/scripts/fetch-eose-news.js'
permissions:
  contents: write
concurrency:
  group: eose-news-update
  cancel-in-progress: true
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch news → data/eose-news.json
        run: node .github/scripts/fetch-eose-news.js
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/eose-news.json
          if git diff --cached --quiet; then echo "No change."; exit 0; fi
          LATEST=$(node -e "const j=require('./data/eose-news.json');process.stdout.write((j.items[0]||{}).headline||'update')")
          git commit -m "chore(eose-news): refresh — ${LATEST} [skip ci]"
          git push
